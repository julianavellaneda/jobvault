name: desktop-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node (host — runs Vite/rolldown for the SPA build)
        uses: actions/setup-node@v4
        with:
          # Node 22+ — better-sqlite3 12.10 only publishes prebuilts for
          # ABI v127+, and we need a prebuild for the x64-on-arm64 cross
          # case (no system compiler-against-x64-headers in CI).
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}

      - name: Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Fetch x64 Node + better-sqlite3 for sidecar (Intel-on-Apple-Silicon)
        # The host build above runs Vite/rolldown with arm64 Node so its
        # native bindings load. The sidecar shipped inside the .dmg, however,
        # has to be x64. Fetch a stand-alone x64 Node binary into /tmp and
        # swap better-sqlite3's prebuilt for the x64 build so prepare-tauri-
        # sidecar can copy both into the bundle.
        if: matrix.target == 'x86_64-apple-darwin' && runner.os == 'macOS'
        run: |
          NODE_VER=$(node -v | tr -d v)
          curl -fsSL "https://nodejs.org/dist/v$NODE_VER/node-v$NODE_VER-darwin-x64.tar.xz" -o /tmp/node-x64.tar.xz
          mkdir -p /tmp/node-x64
          tar -xJf /tmp/node-x64.tar.xz -C /tmp/node-x64 --strip-components=1
          echo "SIDECAR_NODE=/tmp/node-x64/bin/node" >> "$GITHUB_ENV"
          cd node_modules/better-sqlite3
          npx prebuild-install --runtime=node --target_arch=x64 --target_platform=darwin --force

      - name: Build SPA + server bundle
        run: |
          bun run build
          bun run build:server

      - name: Prepare Tauri sidecar
        env:
          # Tells prepare-tauri-sidecar to name the sidecar binary after the
          # target triple instead of the runner's host (`rustc -vV`), so the
          # x86_64-apple-darwin build on an arm64 runner emits
          # `jobvault-node-x86_64-apple-darwin` as Tauri expects.
          TARGET_TRIPLE: ${{ matrix.target }}
        run: bun run tauri:prepare

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Import the Developer ID Application cert into an ephemeral keychain
          # so `codesign` can find it. The keychain is deleted in the cleanup
          # step; the password is per-run and never leaves the runner.
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend our keychain to the search list so codesign finds the identity.
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Tauri build
        env:
          # macOS code signing + notarization (Tauri v2 reads these natively).
          # Empty on Linux runs — Tauri only signs the macOS bundle.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signing — separate from Apple codesigning; leave empty.
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: bun run tauri:build -- --target ${{ matrix.target }}

      - name: Clean up keychain
        if: runner.os == 'macOS' && always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jobvault-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          fail_on_unmatched_files: false
