name: desktop-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            node-arch: arm64
          - os: macos-14
            target: x86_64-apple-darwin
            node-arch: x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            node-arch: x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node (matches sidecar)
        uses: actions/setup-node@v4
        with:
          # Node 22+ — better-sqlite3 12.10 only publishes prebuilts for
          # ABI v127+, and we need a prebuild for the x64-on-arm64 cross
          # case (no system compiler-against-x64-headers in CI).
          node-version: '22'
          architecture: ${{ matrix.node-arch }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}

      - name: Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Cross-fetch x64 better-sqlite3 binary (Intel-on-Apple-Silicon)
        # When we build x86_64-apple-darwin on an arm64 runner, bun install
        # downloaded the arm64 prebuilt of better-sqlite3. prepare-tauri-sidecar
        # copies that .node file straight into the bundle, so we have to swap
        # it for the x64 prebuilt before the bundle is assembled.
        if: matrix.target == 'x86_64-apple-darwin' && runner.os == 'macOS'
        working-directory: node_modules/better-sqlite3
        run: npx prebuild-install --runtime=node --target_arch=x64 --target_platform=darwin --force

      - name: Build SPA + server bundle
        run: |
          bun run build
          bun run build:server

      - name: Prepare Tauri sidecar
        run: bun run tauri:prepare

      - name: Tauri build
        env:
          # Avoid Tauri's bundle signing in CI for now — distribute unsigned
          # artifacts and gate notarization on a separate workflow.
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: bun run tauri:build -- --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jobvault-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          fail_on_unmatched_files: false
